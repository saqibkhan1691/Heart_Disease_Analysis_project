{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/get_started.css') }}">

<div class="main-container">

<h1 class="page-title">Heart Disease Risk Prediction</h1>

<div class="layout">

<!-- LEFT PANEL -->
<div class="card feature-card">

<h3>Select Factors</h3>

<div class="feature-list">

<!-- Binary Features -->
{% for feature in binary_features %}

<div class="feature-item">
<label>{{ feature }}</label>

<input
type="checkbox"
class="feature-input"
data-feature="{{ feature }}"
>

</div>

{% endfor %}


<!-- Numeric Features -->
{% for feature in numeric_features %}

<div class="feature-item">

<label>{{ feature }}</label>

<input
type="number"
step="any"
placeholder="Enter value"
class="feature-input"
data-feature="{{ feature }}"
>

</div>

{% endfor %}

</div>

<button id="predictBtn" class="primary-btn">
Predict Risk
</button>

</div>


<!-- RISK CARD -->
<div class="card risk-card">

<h3>YOUR HEART RISK</h3>

<div class="gauge">

<div class="gauge-center">
<h2 id="riskPercent">0%</h2>
<p id="riskLevel">Low</p>
</div>

</div>

</div>


<!-- IMPROVEMENT -->
<div class="card improvement-card">

<h3>IMPROVE YOUR RISK</h3>

<div class="histogram">

<div class="bar-container">
<div class="bar current-bar" id="currentBar"></div>
<span>Current</span>
</div>

<div class="bar-container">
<div class="bar improved-bar" id="improvedBar"></div>
<span>After Improvement</span>
</div>

</div>

<h4 id="reductionText"></h4>
<p id="insightText"></p>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='js/risk.js') }}"></script>

{% endblock %}
